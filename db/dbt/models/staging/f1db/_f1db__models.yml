version: 2

models:
  - name: stg_f1db__driver
    columns:
      - name: driver_id
        tests:
          - not_null
          - unique
      - name: driver_code
        tests:
          - not_null
  - name: stg_f1db__country
    columns:
      - name: country_id
        tests:
          - not_null
          - unique
      - name: country_name
        tests:
          - not_null
      - name: alpha2_code
        tests:
          - not_null
          - unique
      - name: alpha3_code
        tests:
          - not_null
          - unique
      - name: continent_id
        tests:
          - not_null
  - name: stg_f1db__constructor
    columns:
      - name: constructor_id
        tests:
          - not_null
          - unique
      - name: constructor_name
        tests:
          - not_null
      - name: constructor_full_name
        tests:
          - not_null
      - name: country_id
        tests:
          - not_null
  - name: stg_f1db__circuit
    columns:
      - name: circuit_id
        tests:
          - not_null
          - unique
      - name: circuit_name
        tests:
          - not_null
      - name: circuit_full_name
        tests:
          - not_null
      - name: country_id
        tests:
          - not_null
  - name: stg_f1db__race
