        tests:
          - not_null
      - name: circuit_id
        tests:
          - not_null
      - name: grand_prix_id
        tests:
          - not_null
  - name: stg_f1db__race_result
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
            - race_id
            - position_display_order
    columns:
      - name: race_id
        tests:
          - not_null
      - name: position_display_order
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: constructor_id
        tests:
