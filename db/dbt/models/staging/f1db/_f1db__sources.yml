version: 2

sources:
  - name: f1db
    schema: "{{ var('f1db_schema', 'public') }}"
    description: F1DB source tables and views restored from the canonical PostgreSQL dump.
    tables:
      - name: continent
      - name: country
      - name: driver
      - name: driver_family_relationship
      - name: constructor
      - name: constructor_chronology
      - name: chassis
      - name: engine_manufacturer
      - name: engine
      - name: tyre_manufacturer
      - name: entrant
      - name: circuit
      - name: circuit_layout
      - name: grand_prix
      - name: season
      - name: season_entrant
      - name: season_entrant_constructor
      - name: season_entrant_chassis
      - name: season_entrant_engine
      - name: season_entrant_tyre_manufacturer
      - name: season_entrant_driver
      - name: season_constructor
      - name: season_engine_manufacturer
      - name: season_tyre_manufacturer
      - name: season_driver
      - name: season_driver_standing
      - name: season_constructor_standing
      - name: race
      - name: race_data
      - name: race_driver_standing
      - name: race_constructor_standing
      - name: pre_qualifying_result
      - name: free_practice_1_result
      - name: free_practice_2_result
      - name: free_practice_3_result
      - name: free_practice_4_result
      - name: qualifying_1_result
      - name: qualifying_2_result
      - name: qualifying_result
      - name: sprint_qualifying_result
      - name: sprint_starting_grid_position
      - name: sprint_race_result
      - name: warming_up_result
      - name: starting_grid_position
      - name: race_result
      - name: fastest_lap
      - name: pit_stop
      - name: driver_of_the_day_result
