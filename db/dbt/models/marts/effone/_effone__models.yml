version: 2

models:
  - name: circuits
    description: One row per circuit with location, layout, and race history fields.
    config:
      contract:
        enforced: true
    columns:
      - name: circuit_full_name
        data_type: text
        constraints:
          - type: not_null
      - name: circuit_id
        data_type: text
        description: F1DB circuit identifier.
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: circuit_name
        data_type: text
        constraints:
          - type: not_null
      - name: circuit_type
        data_type: text
        constraints:
          - type: not_null
      - name: country
        data_type: text
        constraints:
          - type: not_null
      - name: country_id
        data_type: text
        constraints:
          - type: not_null
      - name: direction
        data_type: text
        constraints:
          - type: not_null
      - name: first_race_date
        data_type: date
      - name: first_race_id
        data_type: integer
      - name: first_race_name
        data_type: text
      - name: last_race_date
        data_type: date
      - name: last_race_id
        data_type: integer
      - name: last_race_name
        data_type: text
      - name: latitude
        data_type: numeric(10, 6)
        constraints:
          - type: not_null
      - name: length_km
        data_type: numeric(6, 3)
        constraints:
          - type: not_null
      - name: location
        data_type: text
        constraints:
          - type: not_null
      - name: longitude
        data_type: numeric(10, 6)
        constraints:
          - type: not_null
      - name: previous_names
        data_type: text
      - name: race_count
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: turns
        data_type: integer
        constraints:
          - type: not_null

  - name: constructors
    description: One row per constructor with all-time summary metrics.
    config:
      contract:
        enforced: true
    columns:
      - name: championship_count
        data_type: integer
        constraints:
          - type: not_null
      - name: constructor_full_name
        data_type: text
        constraints:
          - type: not_null
      - name: constructor_id
        data_type: text
        description: F1DB constructor identifier.
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: constructor_name
        data_type: text
        constraints:
          - type: not_null
      - name: country_id
        data_type: text
        constraints:
          - type: not_null
      - name: entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: fastest_lap_count
        data_type: integer
        constraints:
          - type: not_null
      - name: first_race_date
        data_type: date
      - name: first_race_id
        data_type: integer
      - name: first_race_name
        data_type: text
      - name: last_race_date
        data_type: date
      - name: last_race_id
        data_type: integer
      - name: last_race_name
        data_type: text
      - name: nationality
        data_type: text
        constraints:
          - type: not_null
      - name: podium_count
        data_type: integer
        constraints:
          - type: not_null
      - name: primary_color_hex
        data_type: text
        description: Primary constructor display color as a six-digit hex code.
        constraints:
          - type: not_null
        tests:
          - not_null
          - hex_color
      - name: qualifying_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: qualifying_p1_count
        data_type: integer
        constraints:
          - type: not_null
      - name: race_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: race_start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: secondary_color_hex
        data_type: text
        description: Optional secondary constructor display color as a six-digit hex code.
        tests:
          - hex_color
      - name: sprint_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: sprint_start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: total_points
        data_type: numeric(8, 2)
        constraints:
          - type: not_null
      - name: total_points_x100
        data_type: integer
        constraints:
          - type: not_null
      - name: win_count
        data_type: integer
        constraints:
          - type: not_null

  - name: drivers
    description: One row per driver with biographical fields and all-time summary metrics.
    config:
      contract:
        enforced: true
    columns:
      - name: championship_count
        data_type: integer
        constraints:
          - type: not_null
      - name: country_of_birth_id
        data_type: text
        constraints:
          - type: not_null
      - name: date_of_birth
        data_type: date
        constraints:
          - type: not_null
      - name: date_of_death
        data_type: date
      - name: driver_code
        data_type: text
        description: Short driver code used in race timing and result displays.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: driver_full_name
        data_type: text
        description: Full display name.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: driver_id
        data_type: text
        description: F1DB driver identifier.
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: driver_name
        data_type: text
        description: Display name for UI contexts.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: driver_number
        data_type: integer
      - name: entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: fastest_lap_count
        data_type: integer
        constraints:
          - type: not_null
      - name: first_name
        data_type: text
        constraints:
          - type: not_null
      - name: first_race_date
        data_type: date
      - name: first_race_id
        data_type: integer
      - name: first_race_name
        data_type: text
      - name: gender
        data_type: text
        constraints:
          - type: not_null
      - name: last_name
        data_type: text
        constraints:
          - type: not_null
      - name: last_race_date
        data_type: date
      - name: last_race_id
        data_type: integer
      - name: last_race_name
        data_type: text
      - name: nationality
        data_type: text
        description: Driver nationality display label.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: nationality_country_id
        data_type: text
        description: F1DB identifier for the driver's primary nationality.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: nationality_country_code
        data_type: text
        constraints:
          - type: not_null
        tests:
          - not_null
          - iso_alpha2_country_code
      - name: place_of_birth
        data_type: text
        constraints:
          - type: not_null
      - name: podium_count
        data_type: integer
        constraints:
          - type: not_null
      - name: qualifying_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: qualifying_p1_count
        data_type: integer
        constraints:
          - type: not_null
      - name: race_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: race_start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: second_nationality_country_id
        data_type: text
      - name: second_nationality_country_code
        data_type: text
        tests:
          - iso_alpha2_country_code
      - name: sprint_entry_count
        data_type: integer
        constraints:
          - type: not_null
      - name: sprint_start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: start_count
        data_type: integer
        constraints:
          - type: not_null
      - name: total_points
        data_type: numeric(8, 2)
        constraints:
          - type: not_null
      - name: total_points_x100
        data_type: integer
        description: Driver career points multiplied by 100 for integer comparisons.
        constraints:
          - type: not_null
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: win_count
        data_type: integer
        constraints:
          - type: not_null

  - name: seasons
    description: One row per Formula 1 season with event counts and final champion references.
    config:
      contract:
        enforced: true
    columns:
      - name: constructor_count
        data_type: integer
        constraints:
          - type: not_null
      - name: driver_count
        data_type: integer
        constraints:
          - type: not_null
      - name: first_race_date
        data_type: date
      - name: last_race_date
        data_type: date
      - name: race_count
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: season
        data_type: integer
        description: Championship year.
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: sprint_count
        data_type: integer
        constraints:
          - type: not_null
      - name: wcc_constructor_id
        data_type: text
      - name: wcc_constructor_name
        data_type: text
      - name: wdc_driver_id
        data_type: text
      - name: wdc_driver_name
        data_type: text

  - name: races
    description: One row per race with schedule, circuit, format, and winner summary fields.
    config:
      contract:
        enforced: true
    columns:
      - name: circuit_id
        data_type: text
        constraints:
          - type: not_null
      - name: circuit_layout_id
        data_type: text
        constraints:
          - type: not_null
      - name: circuit_type
        data_type: text
        constraints:
          - type: not_null
      - name: course_length_km
        data_type: numeric(6, 3)
        constraints:
          - type: not_null
      - name: direction
        data_type: text
        constraints:
          - type: not_null
      - name: fp1_date
        data_type: date
      - name: fp1_time
        data_type: time
      - name: fp2_date
        data_type: date
      - name: fp2_time
        data_type: time
      - name: fp3_date
        data_type: date
      - name: fp3_time
        data_type: time
      - name: grand_prix_id
        data_type: text
        constraints:
          - type: not_null
      - name: grand_prix_name
        data_type: text
        constraints:
          - type: not_null
      - name: pole_driver_id
        data_type: text
      - name: pole_driver_name
        data_type: text
      - name: qualifying_date
        data_type: date
      - name: qualifying_format
        data_type: text
        constraints:
          - type: not_null
      - name: qualifying_time
        data_type: time
      - name: race_date
        data_type: date
        constraints:
          - type: not_null
      - name: race_distance_km
        data_type: numeric(6, 3)
        constraints:
          - type: not_null
      - name: race_id
        data_type: integer
        description: F1DB race identifier.
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: race_laps
        data_type: integer
        constraints:
          - type: not_null
      - name: race_name
        data_type: text
        constraints:
          - type: not_null
      - name: race_official_name
        data_type: text
        constraints:
          - type: not_null
      - name: race_round
        data_type: integer
        constraints:
          - type: not_null
      - name: race_time
        data_type: time
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: scheduled_distance_km
        data_type: numeric(6, 3)
      - name: scheduled_laps
        data_type: integer
      - name: season
        data_type: integer
        description: Championship year for the race.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: sprint_date
        data_type: date
      - name: sprint_qualifying_date
        data_type: date
      - name: sprint_qualifying_format
        data_type: text
      - name: sprint_qualifying_time
        data_type: time
      - name: sprint_time
        data_type: time
      - name: sprint_winner_constructor_id
        data_type: text
      - name: sprint_winner_constructor_name
        data_type: text
      - name: sprint_winner_driver_id
        data_type: text
      - name: sprint_winner_driver_name
        data_type: text
      - name: turns
        data_type: integer
        constraints:
          - type: not_null
      - name: winner_constructor_id
        data_type: text
      - name: winner_constructor_name
        data_type: text
      - name: winner_driver_id
        data_type: text
      - name: winner_driver_name
        data_type: text

  - name: race_results
    description: One row per official race result entry. The grain is race plus finish order because historical races can contain multiple entries for one driver.
    config:
      contract:
        enforced: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - race_id
              - finish_order
    columns:
      - name: car_number
        data_type: integer
      - name: circuit_id
        data_type: text
        constraints:
          - type: not_null
      - name: constructor_id
        data_type: text
        description: Constructor associated with this official result entry.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('constructors')
                field: constructor_id
      - name: constructor_name
        data_type: text
        constraints:
          - type: not_null
      - name: driver_code
        data_type: text
        constraints:
          - type: not_null
      - name: driver_id
        data_type: text
        description: Driver associated with this official result entry.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('drivers')
                field: driver_id
      - name: driver_name
        data_type: text
        constraints:
          - type: not_null
      - name: elapsed_time
        data_type: text
      - name: elapsed_time_ms
        data_type: integer
      - name: engine_manufacturer_id
        data_type: text
        constraints:
          - type: not_null
      - name: finish_order
        data_type: integer
        description: Source display order for official result rows. Use this for official wins, podiums, and race result ordering.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: finish_position
        data_type: integer
      - name: gap
        data_type: text
      - name: gap_laps
        data_type: integer
      - name: gap_ms
        data_type: integer
      - name: grid_position
        data_type: integer
      - name: interval
        data_type: text
      - name: interval_ms
        data_type: integer
      - name: is_classified_finish
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_dnf
        data_type: boolean
        description: True when the entry started but did not finish, based on F1DB retirement/status text.
        constraints:
          - type: not_null
      - name: is_driver_of_the_day
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_entry
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_fastest_lap
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_grand_slam
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_grid_p1
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_podium
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_points_finish
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_pole_position
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_start
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_win
        data_type: boolean
        constraints:
          - type: not_null
      - name: laps_completed
        data_type: integer
      - name: pit_stop_count
        data_type: integer
      - name: points
        data_type: numeric(8, 2)
        constraints:
          - type: not_null
      - name: points_x100
        data_type: integer
        description: Race points multiplied by 100 for exact integer comparisons.
        constraints:
          - type: not_null
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: positions_gained
        data_type: integer
      - name: position_text
        data_type: text
        constraints:
          - type: not_null
      - name: qualifying_position
        data_type: integer
      - name: race_date
        data_type: date
        constraints:
          - type: not_null
      - name: race_id
        data_type: integer
        description: Race associated with the result row.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('races')
                field: race_id
      - name: race_name
        data_type: text
        constraints:
          - type: not_null
      - name: race_round
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: season
        data_type: integer
        constraints:
          - type: not_null
      - name: status
        data_type: text
      - name: status_category
        data_type: text
        description: Retirement/result category derived from F1DB result status.
        constraints:
          - type: not_null
        tests:
          - accepted_values:
              arguments:
                values:
                  - finished
                  - accident
                  - collision
                  - disqualified
                  - not_qualified
                  - not_classified
                  - withdrawn
                  - mechanical
                  - driver_error
                  - other_retirement
      - name: time_penalty
        data_type: text
      - name: time_penalty_ms
        data_type: integer
      - name: tyre_manufacturer_id
        data_type: text
        constraints:
          - type: not_null

  - name: sprint_results
    description: One row per official sprint result entry. Race and sprint points remain separate.
    config:
      contract:
        enforced: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - race_id
              - driver_id
    columns:
      - name: car_number
        data_type: integer
      - name: circuit_id
        data_type: text
        constraints:
          - type: not_null
      - name: constructor_id
        data_type: text
        description: Constructor associated with this sprint result entry.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('constructors')
                field: constructor_id
      - name: constructor_name
        data_type: text
        constraints:
          - type: not_null
      - name: driver_code
        data_type: text
        constraints:
          - type: not_null
      - name: driver_id
        data_type: text
        description: Driver associated with this sprint result entry.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('drivers')
                field: driver_id
      - name: driver_name
        data_type: text
        constraints:
          - type: not_null
      - name: elapsed_time
        data_type: text
      - name: elapsed_time_ms
        data_type: integer
      - name: engine_manufacturer_id
        data_type: text
        constraints:
          - type: not_null
      - name: finish_order
        data_type: integer
        description: Source display order for official sprint result rows.
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: finish_position
        data_type: integer
      - name: gap
        data_type: text
      - name: gap_laps
        data_type: integer
      - name: gap_ms
        data_type: integer
      - name: grid_position
        data_type: integer
      - name: interval
        data_type: text
      - name: interval_ms
        data_type: integer
      - name: is_classified_finish
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_dnf
        data_type: boolean
        description: True when the sprint entry started but did not finish, based on F1DB retirement/status text.
        constraints:
          - type: not_null
      - name: is_entry
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_grid_p1
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_podium
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_points_finish
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_start
        data_type: boolean
        constraints:
          - type: not_null
      - name: is_win
        data_type: boolean
        constraints:
          - type: not_null
      - name: laps_completed
        data_type: integer
      - name: points
        data_type: numeric(8, 2)
        constraints:
          - type: not_null
      - name: points_x100
        data_type: integer
        description: Sprint points multiplied by 100 for integer comparisons.
        constraints:
          - type: not_null
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: positions_gained
        data_type: integer
      - name: position_text
        data_type: text
        constraints:
          - type: not_null
      - name: qualifying_position
        data_type: integer
      - name: race_date
        data_type: date
        constraints:
          - type: not_null
      - name: race_id
        data_type: integer
        description: Race weekend associated with the sprint result row.
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('races')
                field: race_id
      - name: race_name
        data_type: text
        constraints:
          - type: not_null
      - name: race_round
        data_type: integer
        constraints:
          - type: not_null
      - name: refresh_id
        data_type: bigint
        description: Identifier for the refresh run that produced this row.
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: season
        data_type: integer
        constraints:
          - type: not_null
      - name: status
        data_type: text
      - name: status_category
        data_type: text
        description: Sprint result category derived from F1DB result status text.
        constraints:
          - type: not_null
        tests:
          - accepted_values:
              arguments:
                values:
                  - finished
                  - accident
                  - collision
                  - disqualified
                  - not_qualified
                  - not_classified
