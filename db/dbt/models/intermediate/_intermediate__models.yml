version: 2

models:
  - name: int_f1db__drivers_with_countries
    columns:
      - name: driver_id
        tests:
          - not_null
          - unique

  - name: int_f1db__constructors_with_countries
    columns:
      - name: constructor_id
        tests:
          - not_null
          - unique

  - name: int_f1db__circuits_with_countries
    columns:
      - name: circuit_id
        tests:
          - not_null
          - unique

  - name: int_f1db__races_with_circuits
    columns:
      - name: race_id
        tests:
          - not_null
          - unique

  - name: int_f1db__race_results_with_entities
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - race_id
              - position_display_order
    columns:
      - name: race_id
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

  - name: int_f1db__sprint_results_with_entities
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - race_id
              - position_display_order
    columns:
      - name: race_id
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

  - name: int_f1db__qualifying_results_with_entities
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - race_id
              - position_display_order
    columns:
      - name: race_id
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

